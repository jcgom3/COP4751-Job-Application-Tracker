{% extends "base.html" %}

{% block title %}Edit Application | Job Application Tracker{% endblock %}

{% block content %}
<section class="page-header">
    <div>
        <h2>Edit Application</h2>
        <p>Update the selected application record.</p>
    </div>
    <a class="button-link button-secondary" href="{{ url_for('applications_detail', application_id=application.application_id) }}">Back to Detail</a>
</section>

<section class="card">
    {% if error_message %}
        <div class="alert-error">{{ error_message }}</div>
    {% endif %}

    <form method="POST" class="form-grid">
        <label>
            Job
            <select name="job_id" required>
                <option value="">Select a job</option>
                {% for job in job_options %}
                    <option value="{{ job.job_id }}" {% if job.job_id == application.job_id %}selected{% endif %}>
                        {{ job.company_name }} — {{ job.job_title }}
                    </option>
                {% endfor %}
            </select>
        </label>

        <label>
            Status
            <input type="text" name="status" value="{{ application.status }}" required>
        </label>

        <label>
            Application Date
            <input type="date" name="application_date" value="{{ application.application_date or '' }}">
        </label>

        <label>
            Interview Date
            <input type="date" name="interview_date" value="{{ application.interview_date or '' }}">
        </label>

        <label>
            Resume Version
            <input type="text" name="resume_version" value="{{ application.resume_version or '' }}">
        </label>

        <label class="checkbox-label">
            <input type="checkbox" name="cover_letter_sent" {% if application.cover_letter_sent %}checked{% endif %}>
            Cover Letter Sent
        </label>

        <label class="full-width">
            Notes
            <textarea name="notes" rows="5">{{ application.notes or '' }}</textarea>
        </label>

        <div class="full-width form-actions">
            <button type="submit">Save Changes</button>
        </div>
    </form>
</section>
{% endblock %}
