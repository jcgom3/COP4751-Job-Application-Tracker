{% extends "base.html" %} {% block title %}Edit Company | Job Application
Tracker{% endblock %} {% block content %}
<section class="page-header">
  <div>
    <h2>Edit Company</h2>
    <p>Update the selected company record.</p>
  </div>
  <a
    class="button-link button-secondary"
    href="{{ url_for('companies_detail', company_id=company.company_id) }}"
    >Back to Detail</a
  >
</section>

<section class="card">
  {% if error_message %}
  <div class="alert-error">{{ error_message }}</div>
  {% endif %}

  <form method="POST" class="form-grid">
    <label>
      Company Name
      <input
        type="text"
        name="company_name"
        value="{{ company.company_name }}"
        required
      />
    </label>

    <label>
      Industry
      <input type="text" name="industry" value="{{ company.industry or '' }}" />
    </label>

    <label>
      City
      <input type="text" name="city" value="{{ company.city or '' }}" />
    </label>

    <label>
      State
      <input type="text" name="state" value="{{ company.state or '' }}" />
    </label>

    <label class="full-width">
      Notes
      <textarea name="notes" rows="5">{{ company.notes or '' }}</textarea>
    </label>

    <div class="full-width form-actions">
      <button type="submit">Save Changes</button>
    </div>
  </form>
</section>
{% endblock %}
