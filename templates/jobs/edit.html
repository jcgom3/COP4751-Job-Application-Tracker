{% extends "base.html" %}

{% block title %}Edit Job | Job Application Tracker{% endblock %}

{% block content %}
<section class="page-header">
    <div>
        <h2>Edit Job</h2>
        <p>Update the selected job record.</p>
    </div>
    <a class="button-link button-secondary" href="{{ url_for('jobs_detail', job_id=job.job_id) }}">Back to Detail</a>
</section>

<section class="card">
    {% if error_message %}
        <div class="alert-error">{{ error_message }}</div>
    {% endif %}

    <form method="POST" class="form-grid">
        <label>
            Company
            <select name="company_id" required>
                <option value="">Select a company</option>
                {% for company in company_options %}
                    <option value="{{ company.company_id }}" {% if company.company_id == job.company_id %}selected{% endif %}>
                        {{ company.company_name }}
                    </option>
                {% endfor %}
            </select>
        </label>

        <label>
            Job Title
            <input type="text" name="job_title" value="{{ job.job_title }}" required>
        </label>

        <label>
            Salary Minimum
            <input type="number" step="0.01" name="salary_min" value="{{ job.salary_min or '' }}">
        </label>

        <label>
            Salary Maximum
            <input type="number" step="0.01" name="salary_max" value="{{ job.salary_max or '' }}">
        </label>

        <label>
            Job Type
            <input type="text" name="job_type" value="{{ job.job_type or '' }}">
        </label>

        <label>
            Date Posted
            <input type="date" name="date_posted" value="{{ job.date_posted or '' }}">
        </label>

        <label class="full-width">
            Job Description
            <textarea name="job_description" rows="5">{{ job.job_description or '' }}</textarea>
        </label>

        <label class="full-width">
            Skills
            <input type="text" name="skills_text" value="{{ job.skills_text }}">
        </label>

        <div class="full-width form-actions">
            <button type="submit">Save Changes</button>
        </div>
    </form>
</section>
{% endblock %}
