<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Job Application Tracker{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-row">
        <div>
          <h1 class="site-title">Job Application Tracker</h1>
          <p class="site-subtitle">
            Backend-focused job search management application
          </p>
        </div>
        <nav class="site-nav">
          <a href="{{ url_for('index') }}">Home</a>
          <a href="{{ url_for('companies_list') }}">Companies</a>
          <a href="{{ url_for('jobs_list') }}">Jobs</a>
          <a href="{{ url_for('applications_list') }}">Applications</a>
          <a href="{{ url_for('contacts_list') }}">Contacts</a>
        </nav>
      </div>
    </header>

    <main class="container">{% block content %}{% endblock %}</main>
  </body>
</html>
